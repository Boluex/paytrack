name: Docker Build and Push

on:
  push:
    branches: [ master ]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/docker.yaml"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - frontend
          - backend

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    environment: DockerHub
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'frontend'
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/paytrack-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/paytrack-frontend:${{ github.run_number }}.0

      - name: Scan with trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/paytrack-frontend:${{ github.run_number }}.0
          format: table
          exit-code: 0
          severity: CRITICAL

  build-backend:
    runs-on: ubuntu-latest
    environment: DockerHub
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'backend'
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/paytrack-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/paytrack-backend:${{ github.run_number }}.0

      - name: Scan with trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/paytrack-backend:${{ github.run_number }}.0
          format: table
          exit-code: 0
          severity: CRITICAL

  update-manifest:
    needs: [build-frontend, build-backend]
    if: always() && (needs.build-frontend.result == 'success' || needs.build-backend.result == 'success')
    runs-on: ubuntu-latest
    environment: DockerHub
    steps:
      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: Boluex/paytrack-cloud
          ref: master
          token: ${{ secrets.MANIFEST_REPO_TOKEN }}

      - name: Update frontend image tag
        if: needs.build-frontend.result == 'success'
        run: |
          sed -i -E "s#image: .*paytrack-frontend:.*#image: ${{ secrets.DOCKERHUB_USERNAME }}/paytrack-frontend:${{ github.run_number }}.0#" fe-depl.yaml

      - name: Update backend image tag
        if: needs.build-backend.result == 'success'
        run: |
          sed -i -E "s#image: .*paytrack-backend:.*#image: ${{ secrets.DOCKERHUB_USERNAME }}/paytrack-backend:${{ github.run_number }}.0#" be-depl.yaml

      - name: Commit and push changes
        run: |
          git config user.email "awomewekolawole1@gmail.com"
          git config user.name "Boluex"
          if [ -n "$(git status --porcelain fe-depl.yaml be-depl.yaml)" ]; then
            git add fe-depl.yaml be-depl.yaml
            git commit -m "chore: update image tags to version ${{ github.run_number }}.0 [skip ci]"
            git push origin master
          else
            echo "No changes detected. Skipping push."
          fi